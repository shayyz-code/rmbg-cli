[package]
name = "rmtg"
version = "0.1.0"
edition = "2021"
description = "Remove transparency checkerboard grids from images"
license = "MIT"
repository = "https://github.com/YOUR_USERNAME/rmtg"
readme = "README.md"

[dependencies]
anyhow = "1"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "bmp", "gif", "tiff"] }
thiserror = "2"

[dev-dependencies]
tempfile = "3"
