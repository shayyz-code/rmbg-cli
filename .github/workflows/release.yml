name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            asset_name: rmtg
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
            asset_name: rmtg
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            asset_name: rmtg
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            asset_name: rmtg
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            asset_name: rmtg.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.asset_name }}" dist/
          tar -czf "rmtg-${{ matrix.target }}.tar.gz" -C dist "${{ matrix.asset_name }}"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.asset_name }}" dist/
          Compress-Archive -Path "dist/${{ matrix.asset_name }}" -DestinationPath "rmtg-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtg-${{ matrix.target }}
          path: rmtg-${{ matrix.target }}.*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
